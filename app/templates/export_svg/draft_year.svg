<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1260" width="2400" height="1260">
  <defs>
    <style type="text/css">
      .title { font-family: 'Russo One', sans-serif; font-size: 72px; fill: #0f172a; text-transform: uppercase; }
      .subtitle { font-family: 'Azeret Mono', monospace; font-size: 36px; fill: #64748b; }
      .label { font-family: 'Azeret Mono', monospace; font-size: 28px; fill: #334155; }
      .watermark { font-family: 'Azeret Mono', monospace; font-size: 32px; fill: #ffffff; }
      .tile-name { font-family: 'Russo One', sans-serif; font-size: 30px; fill: #0f172a; }
      .tile-metric { font-family: 'Azeret Mono', monospace; font-size: 24px; fill: #64748b; text-transform: uppercase; }
      .tile-value { font-family: 'Azeret Mono', monospace; font-size: 34px; fill: #0f172a; font-weight: 600; }
      .tile-badge { font-family: 'Russo One', sans-serif; font-size: 22px; fill: #ffffff; }
    </style>
    <!-- Scanlines pattern -->
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#0f172a" stroke-width="1" opacity="0.03"/>
    </pattern>
    <!-- Dot matrix pattern -->
    <pattern id="dotmatrix" patternUnits="userSpaceOnUse" width="24" height="24">
      <circle cx="12" cy="12" r="1" fill="#64748b" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="2400" height="1260" fill="#f8fafc"/>
  <rect width="2400" height="1260" fill="url(#dotmatrix)"/>
  <rect width="2400" height="1260" fill="url(#scanlines)"/>

  <!-- Accent bar at top -->
  <rect x="0" y="0" width="2400" height="12" fill="{{ accent_color }}"/>

  <!-- Header section -->
  <g transform="translate(96, 60)">
    <text x="0" y="60" class="title">{{ title }}</text>
    <text x="0" y="115" class="subtitle">{{ subtitle }}</text>
  </g>

  <!-- Divider line -->
  <line x1="96" y1="200" x2="2304" y2="200" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Winner tiles grid (2 rows x 3 columns) -->
  <g transform="translate(96, 230)">
    {% for tile in tiles %}
    {% set col = loop.index0 % 3 %}
    {% set row_num = loop.index0 // 3 %}
    {% set x_offset = col * 740 %}
    {% set y_offset = row_num * 430 %}

    {% if tile.name != '—' %}
    <g transform="translate({{ x_offset }}, {{ y_offset }})">
      <!-- Card background -->
      <rect x="0" y="0" width="700" height="400" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

      <!-- Metric label badge at top -->
      <rect x="0" y="0" width="700" height="52" rx="16" fill="{{ accent_color }}" opacity="0.1"/>
      <rect x="0" y="26" width="700" height="26" fill="{{ accent_color }}" opacity="0.1"/>
      <text x="350" y="38" text-anchor="middle" class="tile-metric" fill="{{ accent_color }}">{{ tile.metric_label }}</text>

      <!-- Player photo or placeholder -->
      {% if tile.has_photo and tile.photo_data_uri %}
      <clipPath id="winner-photo-{{ loop.index }}">
        <rect x="30" y="72" width="200" height="200" rx="10"/>
      </clipPath>
      <image href="{{ tile.photo_data_uri }}" x="30" y="72" width="200" height="200" clip-path="url(#winner-photo-{{ loop.index }})" preserveAspectRatio="xMidYMid slice"/>
      <rect x="30" y="72" width="200" height="200" rx="10" fill="none" stroke="{{ accent_color }}" stroke-width="3"/>
      {% else %}
      <rect x="30" y="72" width="200" height="200" rx="10" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2"/>
      <text x="130" y="160" text-anchor="middle" class="label" fill="#475569">{{ tile.name.split()[0] }}</text>
      {% if tile.name.split() | length > 1 %}
      <text x="130" y="195" text-anchor="middle" class="label" fill="#475569" font-size="22">{{ tile.name.split()[1:] | join(' ') }}</text>
      {% endif %}
      {% endif %}

      <!-- Winner badge -->
      <rect x="30" y="290" width="200" height="40" rx="20" fill="{{ accent_color }}"/>
      <text x="130" y="317" text-anchor="middle" class="tile-badge">WINNER</text>

      <!-- Player name and value (right side) -->
      <text x="260" y="130" class="tile-name">{{ tile.name }}</text>
      <text x="260" y="200" class="tile-value">{{ tile.value }}</text>
    </g>
    {% endif %}
    {% endfor %}
  </g>

  <!-- Footer watermark bar -->
  <rect x="0" y="1148" width="2400" height="112" fill="#1e293b"/>
  <text x="2304" y="1216" text-anchor="end" class="watermark">nbadraft.app</text>

  <!-- Scanlines overlay on footer -->
  <rect x="0" y="1148" width="2400" height="112" fill="url(#scanlines)" opacity="0.5"/>
</svg>
